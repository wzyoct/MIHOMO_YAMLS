# SubStore YAML 格式覆写
# 用途：国外走代理 / 国内走直连
#
# 使用方法：
#   将此文件放到 GitHub 公开仓库
#   在 SubStore → 文件 → 脚本操作 → 填入此文件的 Raw 链接
#
# 此文件控制：规则、代理组、DNS、基础设置
# 节点由 SubStore 自动从你的订阅注入，不需要在这里填


# ── 基础设置 ──────────────────────────────────────────────────────

mixed-port: 7890
allow-lan: false
mode: rule
log-level: warning
ipv6: false
external-controller: 127.0.0.1:9090
secret: ""
unified-delay: true
tcp-concurrent: true


# ── DNS ───────────────────────────────────────────────────────────

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  # 遵守路由规则：代理域名走代理侧 DNS 解析，不被国内 DNS 污染
  respect-rules: true

  # fake-ip 白名单：这些域名不造假，直接返回真实 IP
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localhost"
    - "+.stun.*.*"
    - "+.stun.*.*.*"
    - "time.windows.com"
    - "time.nist.gov"
    - "time.apple.com"
    - "ntp.aliyun.com"
    - "+.ntp.org.cn"
    - "localhost.ptlogin2.qq.com"
    - "router.asus.com"

  # 专门用于解析代理节点地址本身（不走代理，防止鸡生蛋问题）
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query

  # 国内域名 → 国内 DNS；国外域名 → 加密 DNS（配合 respect-rules 走代理解析）
  nameserver-policy:
    "geosite:cn,private":
      - https://223.5.5.5/dns-query
      - https://doh.pub/dns-query
    "geosite:geolocation-!cn":
      - "tls://8.8.8.8"
      - "tls://1.1.1.1"

  # 默认（未被 policy 覆盖的域名）
  nameserver:
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query


# ── 代理组 ────────────────────────────────────────────────────────

proxy-groups:

  # 总开关：默认故障转移，可手动切换策略
  - name: "🚀 代理"
    type: select
    proxies:
      - "🔄 故障转移"
      - "⚡ 自动最快"
      - "✋ 手动选择"

  # 手动选择：从所有节点中自己挑
  - name: "✋ 手动选择"
    type: select
    include-all: true

  # 故障转移：当前节点挂了才切换，连接更稳定，日常推荐
  - name: "🔄 故障转移"
    type: fallback
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    lazy: true
    timeout: 2000
    max-failed-times: 3
    include-all: true

  # 自动最快：持续测速，始终走延迟最低的节点
  - name: "⚡ 自动最快"
    type: url-test
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    lazy: true
    tolerance: 50
    timeout: 2000
    include-all: true


# ── 路由规则 ──────────────────────────────────────────────────────
# 原则：域名类规则在前（不触发 DNS），IP 类规则在后（会触发 DNS 解析）

rules:
  # 域名类：国内直连（先匹配，命中率高）
  - GEOSITE,CN,DIRECT

  # IP 类：局域网 + 国内 IP 直连（no-resolve 避免重复解析）
  - GEOIP,private,DIRECT,no-resolve
  - GEOIP,CN,DIRECT,no-resolve

  # 其余全走代理
  - MATCH,🚀 代理
