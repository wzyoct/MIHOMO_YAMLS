# SubStore YAML 格式覆写
# 用途：国外走代理 / 国内走直连
#
# 使用方法：
#   将此文件放到 GitHub 公开仓库
#   在 SubStore → 文件 → 脚本操作 → 填入此文件的 Raw 链接
#
# 此文件控制：规则、代理组、DNS、基础设置
# 节点由 SubStore 自动从你的订阅注入，不需要在这里填


# ── 覆写基础设置 ─────────────────────────────────────────────────

mixed-port: 7890
allow-lan: false
mode: rule
log-level: warning
ipv6: false
external-controller: 127.0.0.1:9090
secret: ""
unified-delay: true
tcp-concurrent: true

# ── 覆写 DNS ─────────────────────────────────────────────────────

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "time.*.com"
    - "ntp.aliyun.com"
  nameserver:
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query

# ── 覆写代理组 ───────────────────────────────────────────────────
# include-all: true 表示自动包含 SubStore 注入的所有节点

proxy-groups:
  - name: "🚀 代理"
    type: select
    proxies:
      - "🔄 故障转移"      # ← 新增
      - "⚡ 自动最快"
      - "✋ 手动选择"

  - name: "✋ 手动选择"
    type: select
    include-all: true

  - name: "🔄 故障转移"    # ← 新增
    type: fallback
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    timeout: 2000
    max-failed-times: 3
    include-all: true

  - name: "⚡ 自动最快"
    type: url-test
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50
    include-all: true
# ── 覆写路由规则 ─────────────────────────────────────────────────

rules:
  - GEOIP,private,DIRECT,no-resolve
  - GEOSITE,CN,DIRECT
  - GEOIP,CN,DIRECT,no-resolve
  - MATCH,🚀 代理
