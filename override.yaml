# SubStore YAML 格式覆写
# 用途：国外走代理 / 国内走直连
#
# 使用方法：
#   将此文件放到 GitHub 公开仓库
#   在 SubStore → 文件 → 脚本操作 → 填入此文件的 Raw 链接
#
# 此文件控制：基础设置、DNS、代理组、路由规则
# 节点由 SubStore 自动从你的订阅注入，不需要在这里填写


# ── 基础设置 ──────────────────────────────────────────────────────

mixed-port: 7890
allow-lan: false
mode: rule
log-level: warning
ipv6: false
external-controller: 127.0.0.1:9090
secret: ""
unified-delay: true
tcp-concurrent: true


# ── DNS ───────────────────────────────────────────────────────────

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  use-hosts: true
  use-system-hosts: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "localhost"
    - "*.localhost"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "time.windows.com"
    - "time.nist.gov"
    - "time.apple.com"
    - "time.*.com"
    - "ntp.*.com"
    - "ntp.aliyun.com"
    - "+.ntp.org.cn"
    - "stun.*.*"
    - "stun.*.*.*"
    - "localhost.ptlogin2.qq.com"
    - "router.asus.com"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query
  nameserver-policy:
    "+.steamserver.net":
      - https://223.5.5.5/dns-query
      - https://doh.pub/dns-query
    "+.steamcontent.com":
      - https://223.5.5.5/dns-query
      - https://doh.pub/dns-query
    "+.steamchina.com":
      - https://223.5.5.5/dns-query
      - https://doh.pub/dns-query
    "geosite:cn,private,steam@cn":
      - https://223.5.5.5/dns-query
      - https://doh.pub/dns-query
    "geosite:geolocation-!cn":
      - "https://dns.google/dns-query#🚀 代理"
      - "https://cloudflare-dns.com/dns-query#🚀 代理"
  nameserver:
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query


# ── 代理组 ────────────────────────────────────────────────────────

proxy-groups:

  - name: "🚀 代理"
    type: select
    proxies:
      - "🔄 故障转移"
      - "✋ 手动选择"

  - name: "🔄 故障转移"
    type: fallback
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    lazy: true
    timeout: 2000
    max-failed-times: 3
    include-all: true

  - name: "✋ 手动选择"
    type: select
    include-all: true


# ── 路由规则 ──────────────────────────────────────────────────────

rules:
  # Steam 下载直连
  - DOMAIN-SUFFIX,steamserver.net,DIRECT
  - DOMAIN-SUFFIX,steamcontent.com,DIRECT
  - DOMAIN-SUFFIX,steamchina.com,DIRECT
  # Steam GEOSITE 规则
  - GEOSITE,steam@cn,DIRECT
  - GEOSITE,steam,🚀 代理
  # 小米 AI 直连
  - GEOSITE,xiaomi-ai,DIRECT
  # 局域网直连
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - GEOIP,private,DIRECT,no-resolve
  # 国内直连
  - GEOSITE,cn,DIRECT
  - GEOIP,CN,DIRECT,no-resolve
  # 其余走代理
  - MATCH,🚀 代理
