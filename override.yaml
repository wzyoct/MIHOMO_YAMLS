# SubStore YAML 格式覆写
# 用途：国外走代理 / 国内走直连
# 参考：HenryChiao/MIHOMO_YAMLS wiki 第二阶段：新手篇


# ── 基础设置 ──────────────────────────────────────────────────────

mixed-port: 7890
allow-lan: false
mode: rule
log-level: warning
ipv6: false
external-controller: 127.0.0.1:9090
secret: ""
unified-delay: true
tcp-concurrent: true

# GeoData 自动更新（即使用 rule-providers 也建议保留，作为兜底）
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"


# ── 流量嗅探（识别真实域名，提升规则命中率）──────────────────────

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080]
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]


# ── DNS ───────────────────────────────────────────────────────────

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  # respect-rules：DNS 解析遵守路由规则
  # 代理域名会走代理侧 DNS 解析，避免被国内 DNS 污染
  respect-rules: true

  # fake-ip 白名单：这些域名直接返回真实 IP，不造假
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localhost"
    - "+.stun.*.*"
    - "+.stun.*.*.*"
    - "time.windows.com"
    - "time.nist.gov"
    - "time.apple.com"
    - "ntp.aliyun.com"
    - "+.ntp.org.cn"
    - "localhost.ptlogin2.qq.com"
    - "router.asus.com"

  # 代理节点域名解析用的 DNS（解析节点地址本身）
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query

  # 精细 DNS 策略：国内域名用国内 DNS，国外域名用加密 DNS（配合 respect-rules 走代理解析）
  nameserver-policy:
    "geosite:cn,private":
      - https://223.5.5.5/dns-query
      - https://doh.pub/dns-query
    "geosite:geolocation-!cn":
      - "tls://8.8.8.8"
      - "tls://1.1.1.1"

  # 默认 nameserver（未被 policy 覆盖的域名使用）
  nameserver:
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query


# ── 规则集（MetaCubeX 官方 .mrs 格式，二进制，加载最快）─────────

# 锚点：复用规则集基础参数
rs_domain: &rs_domain
  type: http
  behavior: domain
  format: mrs
  interval: 86400

rs_ipcidr: &rs_ipcidr
  type: http
  behavior: ipcidr
  format: mrs
  interval: 86400

rule-providers:

  # 国内域名直连
  cn-domain:
    <<: *rs_domain
    url: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geo/geosite/cn.mrs"
    path: ./rule_set/cn-domain.mrs

  # 国内 IP 直连
  cn-ip:
    <<: *rs_ipcidr
    url: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geo/geoip/cn.mrs"
    path: ./rule_set/cn-ip.mrs

  # 私有网络（局域网）直连
  private-domain:
    <<: *rs_domain
    url: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geo/geosite/private.mrs"
    path: ./rule_set/private-domain.mrs

  private-ip:
    <<: *rs_ipcidr
    url: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geo/geoip/private.mrs"
    path: ./rule_set/private-ip.mrs


# ── 代理组 ────────────────────────────────────────────────────────

proxy-groups:

  # 总开关：日常用故障转移，也可切换到其他策略
  - name: "🚀 代理"
    type: select
    proxies:
      - "🔄 故障转移"
      - "⚡ 自动最快"
      - "✋ 手动选择"

  # 故障转移：当前节点挂了才切，不主动抢更快的，连接更稳定
  - name: "🔄 故障转移"
    type: fallback
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    lazy: true          # 懒检查：不触发时不主动检测，节省资源
    timeout: 2000
    max-failed-times: 3
    include-all: true

  # 自动最快：定期测速，始终走延迟最低的节点
  - name: "⚡ 自动最快"
    type: url-test
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    lazy: true
    tolerance: 50
    timeout: 2000
    include-all: true

  # 手动选择：从所有节点中自己挑
  - name: "✋ 手动选择"
    type: select
    include-all: true


# ── 路由规则（非 IP 类在前，IP 类在后）──────────────────────────
# 原则：先匹配不需要 DNS 解析的域名规则，减少不必要的 DNS 查询

rules:
  # 私有网络直连（局域网）
  - RULE-SET,private-domain,DIRECT
  - RULE-SET,private-ip,DIRECT,no-resolve

  # 国内直连
  - RULE-SET,cn-domain,DIRECT
  - RULE-SET,cn-ip,DIRECT,no-resolve

  # 其余全走代理
  - MATCH,🚀 代理
